<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Diana - 状态栏原型 v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #4a4a4a;
    background-image:
      linear-gradient(rgba(0,0,0,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size: 48px 48px;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .player {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    background: #3d6ba5;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
  }

  /* ============ 右上角状态栏 ============ */
  .hud {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(20, 18, 16, 0.75);
    border: 2px solid #6b4a2f;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  /* 顶部：只保留层数 */
  .top-row {
    color: #f0c674;
    font-size: 14px;
    font-weight: bold;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(160,120,80,0.4);
  }

  .bar-group { display: flex; flex-direction: column; gap: 3px; }
  .bar-label {
    font-size: 12px; color: #d8ccbb;
  }
  .bar-track {
    position: relative;
    height: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.6);
    border-radius: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 10px 0 0 10px;
    transition: width 0.3s ease;
  }
  /* 生命：红色 */
  .hp     { width: 72%; background: linear-gradient(90deg, #8b1a1a, #e23c3c); }
  /* 能量：黄色 */
  .energy { width: 55%; background: linear-gradient(90deg, #b58a1a, #f5d020); }

  .bar-value {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
  }

  .hint {
    position: absolute; bottom: 20px; left: 20px;
    color: rgba(255,255,255,0.5); font-size: 13px;
  }
  .controls {
    position: absolute; bottom: 20px; right: 20px;
    display: flex; gap: 8px;
  }
  .controls button {
    background: #6b4a2f; color: #e8d9c0; border: none;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .controls button:hover { background: #8a6340; }
</style>
</head>
<body>

  <div class="player">🤖</div>

  <!-- 右上角状态栏 HUD：层数 + 生命 + 能量 -->
  <div class="hud">
    <div class="top-row">🏰 第 3 层</div>

    <div class="bar-group">
      <div class="bar-label">生命</div>
      <div class="bar-track">
        <div class="bar-fill hp" id="hpFill"></div>
        <div class="bar-value" id="hpText">72 / 100</div>
      </div>
    </div>

    <div class="bar-group">
      <div class="bar-label">能量</div>
      <div class="bar-track">
        <div class="bar-fill energy" id="enFill"></div>
        <div class="bar-value" id="enText">55 / 100</div>
      </div>
    </div>
  </div>

  <div class="hint">← 状态栏固定右上角，不随镜头移动（CanvasLayer 效果）</div>

  <div class="controls">
    <button onclick="damage()">受伤 -15</button>
    <button onclick="heal()">回血 +10</button>
    <button onclick="useEnergy()">用能量 -20</button>
  </div>

  <script>
    let hp = 72, en = 55;
    const maxHp = 100, maxEn = 100;
    function render() {
      document.getElementById('hpFill').style.width = (hp/maxHp*100) + '%';
      document.getElementById('hpText').textContent = hp + ' / ' + maxHp;
      document.getElementById('enFill').style.width = (en/maxEn*100) + '%';
      document.getElementById('enText').textContent = en + ' / ' + maxEn;
    }
    function damage()    { hp = Math.max(0, hp-15); render(); }
    function heal()      { hp = Math.min(maxHp, hp+10); render(); }
    function useEnergy() { en = Math.max(0, en-20); render(); }
    render();
  </script>
</body>
</html>
